name: vifosa
description: Viet Food Shops Alliance — đặt đồ ăn TPHCM
publish_to: 'none'
version: 1.0.9+10

# Spec BR-5: Flutter package name = vifosa
# Spec TO-1: Flutter 3.x + Dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — Spec mục 4.1
  flutter_riverpod: ^2.5.1

  # HTTP client + interceptor
  dio: ^5.4.3

  # Navigation
  go_router: ^13.2.0

  # Secure token storage (JWT)
  flutter_secure_storage: ^9.0.0

  # Image loading & cache
  cached_network_image: ^3.3.1

  # Image picker (upload ảnh món, avatar, post)
  image_picker: ^1.1.4

  # Firebase — Spec TO-7: FCM setup tuần 1
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # Local storage cho guest cart — Spec 5.1.5: guest dùng Hive
  hive_flutter: ^1.1.0

  # Map — Spec TO-6: OSM + flutter_map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Utility
  intl: ^0.19.0              # format giá tiền VNĐ, ngày giờ
  url_launcher: ^6.2.5       # mở link Google Maps, Zalo deep link
  share_plus: ^10.0.0        # chia sẻ link tracking khách vãng lai
  qr_flutter: ^4.1.0         # QR code tracking — Spec 5.2
  permission_handler: ^11.3.1 # GPS permission
  geolocator: ^11.0.0        # lấy vị trí GPS — Spec 5.1.6
  shared_preferences: ^2.3.3 # lưu recent searches, settings nhỏ

  # Real-time order tracking — Socket.IO
  socket_io_client: ^2.0.3+1

  # AdMob rewarded ads
  google_mobile_ads: ^5.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  adaptive_icon_background: "#F4B400"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  ios: true
  image_path: "assets/images/app_icon_solid.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#F4B400"
  image: assets/images/splash_logo.png
  color_dark: "#F4B400"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#F4B400"
    image: assets/images/splash_logo.png
    icon_background_color: "#F4B400"

flutter:
  uses-material-design: true

  assets:
    - assets/images/